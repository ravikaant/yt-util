<!DOCTYPE html>
<html>
<head>
  <title>YouTube Grid Customizer</title>
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    label {
      font-weight: bold;
    }
    input {
      width: 60px;
      padding: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <label for="itemsPerRow">Videos per row:</label>
    <input type="number" id="itemsPerRow" min="2" max="8" value="4">
    <button id="save">Save</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
